# =============================================================================
# load-tests/user.properties
#
# JMeter user properties for Invoice Processing System load tests.
# Pass this file via:  jmeter.bat -q load-tests/user.properties ...
# Or override individual values with -J flags:
#   jmeter.bat -Jtg1_threads=20 ...
# =============================================================================

# ── API Gateway target ────────────────────────────────────────────────────────
# The hostname only — no https:// prefix, no trailing slash
base_url=rw5n87lye8.execute-api.ap-south-1.amazonaws.com
protocol=https
port=443

# ── Reviewer email used in POST /invoices/decision requests ──────────────────
reviewer_email=loadtest@zexxity.online

# ── Invoice ID used for GET-by-ID and decision tests ─────────────────────────
# Overridden by CSV data pool (data/invoice_ids.csv) when present.
invoice_id=INV-TEST-001

# ── Dry-run mode ──────────────────────────────────────────────────────────────
# Set to true to use synthetic invoice IDs in TG4 (approve/reject).
# Lambda still executes end-to-end but DynamoDB UpdateItem is a no-op.
# Prevents real SES emails being sent during load testing.
dry_run=false

# =============================================================================
# THREAD GROUP CONFIGURATION
# Each thread group has: num_threads / ramp_time / duration
#
# Profile guide:
#   Smoke    → threads=1,  ramp=10,  duration=30
#   Baseline → threads=10, ramp=30,  duration=120  (DEFAULT below)
#   Stress   → threads=50, ramp=60,  duration=300
#   Soak     → threads=10, ramp=60,  duration=600
# =============================================================================

# TG1 — GET /invoices (List All)        DynamoDB Scan
tg1_threads=10
tg1_rampup=30
tg1_duration=120

# TG2 — GET /invoices/{id}              DynamoDB GetItem
tg2_threads=10
tg2_rampup=30
tg2_duration=120

# TG3 — POST /invoices/upload-url       S3 Presigner (fastest endpoint)
tg3_threads=15
tg3_rampup=20
tg3_duration=120

# TG4 — POST /invoices/decision         DynamoDB UpdateItem + SES (cross-region)
# Keep lower — SES adds real latency
tg4_threads=5
tg4_rampup=30
tg4_duration=120

# TG5 — GET /invoices/approve|reject    DynamoDB GetItem + UpdateItem (token)
tg5_threads=8
tg5_rampup=30
tg5_duration=120

# TG6 — Cold Start Spike                All endpoints, fast ramp
# Short, aggressive burst to expose Lambda cold start latency
tg6_threads=30
tg6_rampup=10
tg6_duration=60

# =============================================================================
# JMeter engine settings
# =============================================================================

# Summariser interval (seconds between console status lines)
summariser.interval=10

# Keep response data for failed samples only (saves memory under load)
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.response_data.on_error=true

# Include these fields in every JTL line
jmeter.save.saveservice.output_format=csv
jmeter.save.saveservice.print_field_names=true
jmeter.save.saveservice.time=true
jmeter.save.saveservice.latency=true
jmeter.save.saveservice.connect_time=true
jmeter.save.saveservice.timestamp_format=ms
jmeter.save.saveservice.bytes=true
jmeter.save.saveservice.sent_bytes=true
jmeter.save.saveservice.url=true
jmeter.save.saveservice.assertion_results_failure_message=true
jmeter.save.saveservice.thread_counts=true

# SSL — API Gateway uses HTTPS/TLS 1.2+
https.use.cached.ssl.context=false

# Increase thread/connection limits for stress profile
httpclient4.time_to_live=60000
httpclient4.idletimeout=10000
