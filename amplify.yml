version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd invoice-reviewer-react
        - npm install
    build:
      commands:
        - cd invoice-reviewer-react
        - npm run build
  artifacts:
    baseDirectory: invoice-reviewer-react/dist
    files:
      - '**/*'
  cache:
    paths:
      - invoice-reviewer-react/node_modules/**/*
