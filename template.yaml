AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Invoice Processing System – Lambda + API Gateway

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 60
    Architectures: [x86_64]
    CodeUri: target/invoice-extraction-lambda-1.0-SNAPSHOT.jar
    Environment:
      Variables:
        JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"

Resources:

  # ── DynamoDB Table ─────────────────────────────────────────────────────────
  InvoicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: invoices
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invoiceId
          AttributeType: S
      KeySchema:
        - AttributeName: invoiceId
          KeyType: HASH

  # ── Shared IAM Role ────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: invoice-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvoiceLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt InvoicesTable.Arn
              - Effect: Allow
                Action:
                  - textract:AnalyzeExpense
                Resource: "*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - sesv2:SendEmail
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:invoice-processing/config*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::invoice-processing-*/*"

  # ── Lambda: Invoice Extraction (triggered by Step Functions) ──────────────
  InvoiceExtractionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: invoice-extraction
      Handler: com.invoice.processing.InvoiceExtractionHandler::handleRequest
      Role: !GetAtt LambdaExecutionRole.Arn

  # ── Lambda: Get Invoice (called by API Gateway) ────────────────────────────
  GetInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-invoice
      Handler: com.invoice.processing.GetInvoiceHandler::handleRequest
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceApi
            Path: /invoices
            Method: GET
        GetById:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceApi
            Path: /invoices
            Method: GET

  # ── Lambda: Approve / Reject (called by API Gateway) ──────────────────────
  ApproveRejectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: approve-reject-invoice
      Handler: com.invoice.processing.ApproveRejectHandler::handleRequest
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Decision:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceApi
            Path: /invoices/decision
            Method: POST

  # ── API Gateway (HTTP API with CORS) ──────────────────────────────────────
  InvoiceApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

Outputs:
  ApiUrl:
    Description: "API Gateway base URL – paste this into config.js"
    Value: !Sub "https://${InvoiceApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  GetInvoiceFunctionArn:
    Value: !GetAtt GetInvoiceFunction.Arn

  ApproveRejectFunctionArn:
    Value: !GetAtt ApproveRejectFunction.Arn

  InvoiceExtractionFunctionArn:
    Value: !GetAtt InvoiceExtractionFunction.Arn
