version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Static site – no build needed"
  artifacts:
    baseDirectory: .
    files:
      - login.html
      - index.html
      - upload.html
      - review.html
      - audit.html
      - style.css
      - app.js
      - auth.js
      - config.js
  cache:
    paths: []
customRules:
  - source: /audit
    target: /audit.html
    status: "200"
  - source: /review
    target: /review.html
    status: "200"
  - source: /upload
    target: /upload.html
    status: "200"
  - source: /login
    target: /login.html
    status: "200"
  - source: /index
    target: /index.html
    status: "200"
  - source: /<*>
    target: /index.html
    status: "404-200"
