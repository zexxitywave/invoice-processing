<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Invoice Processing – Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">📄 Invoice Processing System</div>
  <div class="nav-links">
    <a href="index.html" class="active">Dashboard</a>
    <a href="upload.html">Upload Invoice</a>
    <a href="review.html">Review Queue</a>
    <a href="audit.html">Audit Report</a>
    <button class="btn btn-secondary btn-sm" onclick="logout()" style="margin-left:1rem">🚪 Logout</button>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">Dashboard</h1>

  <!-- Stat cards -->
  <div class="stats-grid">
    <div class="stat-card approved">
      <div class="stat-icon">✅</div>
      <div class="stat-label">AI Approved</div>
      <div class="stat-value" id="cnt-approved">—</div>
    </div>
    <div class="stat-card review">
      <div class="stat-icon">🔶</div>
      <div class="stat-label">Review Required</div>
      <div class="stat-value" id="cnt-review">—</div>
    </div>
    <div class="stat-card duplicate">
      <div class="stat-icon">🔁</div>
      <div class="stat-label">Duplicates</div>
      <div class="stat-value" id="cnt-duplicate">—</div>
    </div>
    <div class="stat-card total">
      <div class="stat-icon">📦</div>
      <div class="stat-label">Total Invoices</div>
      <div class="stat-value" id="cnt-total">—</div>
    </div>
  </div>

  <!-- Invoice table -->
  <div class="card">
    <div class="card-header">
      <h2>All Invoices</h2>
      <button class="btn btn-primary" onclick="loadDashboard()">🔄 Refresh</button>
    </div>
    <div id="err" class="error-banner hidden"></div>
    <div id="loading" class="loading hidden">Loading…</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Invoice ID</th>
            <th>Vendor</th>
            <th>Date</th>
            <th>Total</th>
            <th>Risk</th>
            <th>AI Status</th>
            <th>Human Decision</th>
            <th>TOTAL Conf.</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="9" class="empty-row">Click Refresh to load invoices</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script>requireLogin(); loadDashboard();</script>
</body>
</html>
