<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Invoice Processing System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .login-logo  { text-align: center; font-size: 2.2rem; margin-bottom: .5rem; }
    .login-title { text-align: center; font-size: 1.15rem; font-weight: 800; color: #0f172a; margin-bottom: .25rem; }
    .login-sub   { text-align: center; font-size: .8rem; color: #64748b; margin-bottom: 2rem; }

    .form-row { margin-bottom: 1rem; }
    .form-row label {
      display: block; font-size: .78rem; font-weight: 700;
      color: #334155; margin-bottom: .3rem;
    }
    .form-row input {
      width: 100%; padding: .6rem .85rem;
      border: 1.5px solid #cbd5e1; border-radius: 8px;
      font-size: .9rem; font-family: inherit; color: #0f172a;
      background: #f8fafc; transition: border-color .15s;
    }
    .form-row input:focus {
      outline: none; border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15); background: #fff;
    }
    .login-btn {
      width: 100%; padding: .7rem;
      background: #6366f1; color: #fff;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 700;
      cursor: pointer; margin-top: .5rem;
      transition: background .15s, transform .1s;
    }
    .login-btn:hover  { background: #4f46e5; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-error {
      background: #fee2e2; color: #b91c1c;
      border-radius: 8px; padding: .65rem .85rem;
      font-size: .83rem; font-weight: 600;
      margin-bottom: 1rem; display: none; text-align: center;
    }
    .login-footer { text-align: center; margin-top: 1.5rem; font-size: .75rem; color: #94a3b8; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">📄</div>
    <div class="login-title">Invoice Processing System</div>
    <div class="login-sub">Sign in to access the reviewer dashboard</div>

    <div id="login-error" class="login-error">❌ Incorrect username or password.</div>

    <form onsubmit="doLogin(event)">
      <div class="form-row">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username"
               autocomplete="username" required autofocus/>
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password"
               autocomplete="current-password" required/>
      </div>
      <button type="submit" class="login-btn">Sign In →</button>
    </form>

    <div class="login-footer">zexxity.online · Invoice Processing System</div>
  </div>

  <script src="/auth.js"></script>
  <script>
    // Already logged in → skip login
    if (sessionStorage.getItem('ips_auth') === 'true') {
      window.location.href = '/index.html';
    }
  </script>

</body>
</html>
